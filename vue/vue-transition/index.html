<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <style>
    html {
      height: 100%;
      background: #FFF;
      color: #000;
      font-size: 62.5%;
    }

    body {
      min-height: 100%;
      margin: 0;
      display: grid;
      place-items: center;
      font-size: 1.4rem;
    }

    .button {
      border: none;
      color: #FFF;
      background: #42b983;
      appearance: none;
      font: inherit;
      font-size: 1.8rem;
      padding: .5em 1em;
      border-radius: .3em;
      cursor: pointer;
    }

    .modal {
      position: absolute;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      margin: auto;
      text-align: center;
      width: fit-content;
      height: fit-content;
      max-width: 22em;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 5px 5px rgba(0, 0, 0, 0.2);
      background: #FFF;
      z-index: 999;
      transform: none;
    }

    .modal h1 {
      margin: 0 0 1rem;
    }

    .modal-overlay {
      content: '';
      position: absolute;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 998;
      background: #2c3e50;
      opacity: 0.6;
      cursor: pointer;
    }

    .fade-enter-active,
    .fade-leave-active {
      transition: opacity .4s linear;
    }

    .fade-enter,
    .fade-leave-to {
      opacity: 0;
    }
/* 
 fade-enter{ } 进入过渡的开始状态，元素被插入时生效，只应用一帧后立即删除；(运动的初始状态)

.fade-enter-active{ } 进入过渡的结束状态，元素被插入时就生效，在 transition/animation 完成之后移除。这个类可以被用来定义过渡的过程时间，延迟和曲线函数。

.fade-leave{ } 离开过渡的开始状态，元素被删除时触发，只应用一帧后立即删除；

.fade-leave-active{ } 离开过渡的结束状态，元素被删除时生效，在 transition/animation 完成之后移除。这个类可以被用来定义过渡的过程时间，延迟和曲线函数。

 */

    .pop-enter-active,
    .pop-leave-active {
      /* cubic-bezier 贝塞尔曲线 匀速 等于 cubic-bezier(0,0,1,1) */
      transition: transform 0.4s cubic-bezier(0.5, 0, 0.5, 1), opacity 0.4s linear;
    }

    .pop-enter,
    .pop-leave-to {
      opacity: 0;
      transform: scale(0.3) translateY(-50%);
    }
  </style>
</head>

<body>
  <div id="app">
    <button @click="showModal = true" class="button">Show Modal</button>
    <transition name="fade" appear>
      <div class="modal-overlay" v-if="showModal" @click="showModal = false"></div>
    </transition>
    <transition name="pop" appear>
      <div class="modal" role="dialog" v-if="showModal">
        <h1>Vue Transitions</h1>
        <p>The <code>&lt;transition&gt;</code> component in Vue can create wonderful animated entrances and exits.</p>
        <button @click="showModal = false" class="button">Hide Modal</button>

      </div>
    </transition>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.10/dist/vue.js"></script>
  <script>
    new Vue({
      // Mount Vue instance to DOM with `el`
      // https://vuejs.org/v2/api/#el
      el: '#app',

      // State with data
      // http://vuejs.org/v2/guide/instance.html#Data-and-Methods
      data() {
        return {
          showModal: false
        }
      }
    });
  </script>
</body>

</html>
